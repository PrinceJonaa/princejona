<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prince Jona</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              'surface-bg': '#0a0a0a',
              'surface-text': '#e0e0e0',
              'deep-bg': '#f5f5f0',
              'deep-text': '#1a1a1a',
              'accent-emerald': '#10b981',
              'accent-gold': '#f59e0b',
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              serif: ['Lora', 'serif'],
            },
          },
        },
      }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Lora:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
      .perspective-1000 { perspective: 1000px; }

      @keyframes assemble {
        0% {
          opacity: 0;
          transform: translate(var(--start-x), var(--start-y)) rotate(var(--start-rotate)) scale(0.5);
        }
        70% {
          opacity: 1;
          transform: translate(0, 0) rotate(0deg) scale(1.2);
        }
        100% {
          opacity: 1;
          transform: translate(0, 0) rotate(0deg) scale(1);
        }
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes pulse {
        0%, 100% {
          transform: scale(1);
          opacity: 0.8;
        }
        50% {
          transform: scale(1.1);
          opacity: 1;
        }
      }
      
      .particle {
          position: absolute;
          border-radius: 50%;
          background: rgba(255, 255, 255, 0.1);
          animation: fadeIn 2s ease-out forwards;
          opacity: 0;
      }

      .interactive-nebula {
        position: relative;
        background: radial-gradient(circle, rgba(255,255,255,0.03) 0%, rgba(255,255,255,0) 60%);
      }

      .interactive-orb {
        position: absolute;
        top: 50%;
        left: 50%;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        font-weight: bold;
        transition: transform 0.2s cubic-bezier(0.25, 1, 0.5, 1), box-shadow 0.3s ease-in-out;
        cursor: pointer;
        z-index: 10;
        white-space: nowrap;
        color: #0a0a0a;
      }
      
      .orb-glow-emerald {
        background-color: #10b981;
        box-shadow: 0 0 20px 7px rgba(16, 185, 129, 0.5), 0 0 8px 2px rgba(16, 185, 129, 0.7);
      }
      .orb-glow-gold {
        background-color: #f59e0b;
        box-shadow: 0 0 20px 7px rgba(245, 158, 11, 0.5), 0 0 8px 2px rgba(245, 158, 11, 0.7);
      }
      .orb-glow-gray {
        background-color: #e0e0e0;
        color: #1a1a1a;
        box-shadow: 0 0 20px 7px rgba(224, 224, 224, 0.4), 0 0 8px 2px rgba(224, 224, 224, 0.6);
      }

    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://aistudiocdn.com/react@^19.1.1",
    "react/": "https://aistudiocdn.com/react@^19.1.1/",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.1.1/",
    "react-router-dom": "https://aistudiocdn.com/react-router-dom@^7.9.1"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
